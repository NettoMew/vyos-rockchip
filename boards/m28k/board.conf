# Widora MangoPi M28K（RK3528）— 双千兆：gmac1 RGMII + PCIe RTL8111HS。
# 板级源注入全部走文件投放：U-Boot 四件套在 boards/m28k/uboot/（镜像源码树结构），
# 内核 DTS + RK3528 USB backport 在 boards/m28k/overlay/.../patches/kernel/
# （vyos-build glob 自动应用，进 RK3528 家族共享内核）。
# 板载 AIC8800 SDIO Wi-Fi 与 SSD1306 OLED 本版不启用（DTS 节点无驱动自然忽略）。
BOARD_SOC="rk3528"
BOARD_UBOOT_DEFCONFIG="mangopi-m28k-rk3528_defconfig"
BOARD_KERNEL_DTB="rockchip/rk3528-mangopi-m28k.dtb"
BOARD_IMAGE_PREFIX="mangopi-m28k"
BOARD_SERIAL_CONSOLE="ttyS0"
BOARD_SERIAL_BAUD="1500000"

# 用内核 DTB（含 132/133 RK3528 PCIe 修复）替代板载残留旧 U-Boot 的控制 DTB。
# image.sh 把内核 DTB 复制成 /boot/<版本>/dtb，grub 模板（hook 94）条件加载。
# m28k 出厂 eMMC 常带旧 U-Boot（PCIe disabled），故必须 override 才能起第二网口。
BOARD_DTB_OVERRIDE="1"

# 板载 AIC8800 SDIO Wi-Fi（mmc2/sdio0）。stage_aic8800 编 out-of-tree 驱动
# （radxa-pkg + 0001/0002 补丁）+ 签名 + 投放进 ISO。真机验证：固件
# fmacfw_8800d80_u02.bin 下载、wlan0 up。
BOARD_WIFI_AIC8800="1"

# 板载 0.91" SSD1306 OLED（oled@3c，DTS 节点已在 140 补丁）。内核 ssd130x 模块出
# /dev/fb0；oled-dash 仪表盘打成 deb 进镜像但默认不启用，手动 systemctl enable --now oled-dash。
BOARD_OLED_DASH="1"
