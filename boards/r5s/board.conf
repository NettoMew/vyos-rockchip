# FriendlyElec NanoPi R5S（RK3568）— 三网口路由：gmac0 1G(WAN) + 2× RTL8125 2.5G(LAN)。
# 纯主线：mainline 6.18.34 自带 rk3568-nanopi-r5s.dts(i)，U-Boot 有 nanopi-r5s-rk3568_defconfig，
# rkbin 有 rk3568 blob —— U-Boot 与内核均零补丁，与 e20c 同属"声明即可"的板。
#
# 与 RK3528 家族的差异全部声明在这里 + 三处数据投放（无引擎 if 分支）：
#   ① SoC=rk3568 → lib/env.sh 选 rk3568 rkbin blob；
#   ② 调试串口是 uart2=ttyS2（DTS chosen: serial2:1500000n8），非 RK3528 的 ttyS0；
#   ③ 2× RTL8125 走官方 r8125 驱动（out-of-tree，BOARD_R8125=1，见 lib/r8125.sh），
#      内核片段 71-rk3568 加 PCIe3 PHY，补丁 150 让 r8169 把 RTL8125 让给 r8125；
#   ④ 网口命名/LED 走"eth0=WAN、eth1+=LAN"族不变式（overlay udev/led，按 PCIe 路径）。
BOARD_SOC="rk3568"
BOARD_UBOOT_DEFCONFIG="nanopi-r5s-rk3568_defconfig"
BOARD_KERNEL_DTB="rockchip/rk3568-nanopi-r5s.dtb"
BOARD_IMAGE_PREFIX="nanopi-r5s"
BOARD_SERIAL_CONSOLE="ttyS2"
BOARD_SERIAL_BAUD="1500000"

# 三个 RJ45 全部经 PCIe（2× RTL8125 在 pcie3x1/3x2），且 WAN(gmac0) 也要确保用含
# PCIe3 PHY 的内核 DTB。U-Boot 控制 DTB 可能偏旧/PCIe3 未全配 → 用内核 6.18 DTB
# 覆盖（image.sh 复制 BOARD_KERNEL_DTB → /boot/<ver>/dtb，hook 94 的 grub 模板加载）。
BOARD_DTB_OVERRIDE="1"

# 2× RTL8125 2.5G 用 Realtek 官方 r8125 驱动（性能/特性优于主线 r8169，OpenWrt 同款）。
# stage_r8125 编 out-of-tree 驱动（openwrt/rtl8125@9.016.01）+ 签名 + 投放进 ISO，
# 开机 modules-load.d 加载。补丁 150 已从 r8169 PCI 表移除 RTL8125 ID，故 r8125 独占绑定。
BOARD_R8125="1"
