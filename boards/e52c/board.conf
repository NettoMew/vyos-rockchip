# Radxa E52C（RK3582 = RK3588S 残核分级 bin）— 双 2.5G 路由：2× RTL8125（pcie2x1l1/l2），
# 无 gmac。纯主线：mainline 6.18.34 自带 rk3582-radxa-e52c.dts（含 rk3588s.dtsi），U-Boot
# 有 generic-rk3588_defconfig，rkbin 有 rk3588 blob → U-Boot/内核零补丁（开核补丁除外）。
# 与 RK35xx 家族差异全声明在此 + 数据投放（引擎零板级 if，沿用 feature-flag 门控）：
#   ① SoC=rk3588 → lib/env.sh 选 rk3588 rkbin blob（bl31_v1.54 + lp4/lp5 ddr）；
#   ② 调试串口 uart2=ttyS2（DTS chosen: serial2:1500000n8，同 R5S）；
#   ③ 两口都是 out-of-tree RTL8125（BOARD_R8125=1 → lib/r8125.sh + 家族补丁 150）；
#   ④ 内核片段 72-rockchip-rk3588 补 CLK_RK3588 + rk806(SPI PMIC) + rk8602 大核电源；
#   ⑤ 开核（BOARD_UNLOCK_CORES=1，默认开）：U-Boot 补丁去市场分级砍核，放出好核 + GPU。
BOARD_SOC="rk3588"
BOARD_UBOOT_DEFCONFIG="generic-rk3588_defconfig"
BOARD_KERNEL_DTB="rockchip/rk3582-radxa-e52c.dtb"
BOARD_IMAGE_PREFIX="radxa-e52c"
BOARD_SERIAL_CONSOLE="ttyS2"
BOARD_SERIAL_BAUD="1500000"

# 两口全经 PCIe（pcie2x1l1/l2），且 generic-rk3588 的 U-Boot 控制 DTB 不是 e52c 专属
# （无本板 pcie/PMIC/NIC 节点）→ 内核必须用含完整 e52c 外设的内核 6.18 DTB。BOARD_DTB_OVERRIDE
# 让 grub devicetree 加载 /boot/<ver>/dtb（本板内核 DTB），覆盖 U-Boot 控制 DTB（同 R5S/m28k）。
# 注：该 DTB 是 rk3588s.dtsi 全 8 核节点 → 内核按 BL31 实际能上线的核启动；开核见下文交互说明。
BOARD_DTB_OVERRIDE="1"

# 2× RTL8125 2.5G 用 Realtek 官方 r8125 驱动（OpenWrt 同款，性能/特性优于主线 r8169）。
# stage_r8125（lib/r8125.sh，须 KERNEL_BUILD_MODE=cross）同棵 work/kernel 树交叉编 + 内核 key
# 签名 + 投放 board-assets；补丁 150 让 r8169 让出 RTL8125 ID 使 r8125 独占绑定。
# 注意：不设 BOARD_THIRD_PORT——E52C 只有两口（eth0/eth1，均 r8125），共享 default_config
# 的 eth0/eth1 DHCP 即对，无需 image.sh 追加 eth2（那是 R5S 三口板才做的）。
BOARD_R8125="1"

# RK3582 开核（默认开）：RK3582 是 RK3588S 残核分级品，砍核全发生在 U-Boot ft_system_setup()
# （读 OTP efuse 后套市场分级策略）。boards/e52c/uboot/patches/0001 把三段分级策略 #if 0 掉
# （同簇一核坏就连坐砍整簇 / 强制再砍一个大核簇 / 强制砍 Mali-G610 GPU），保留 OTP 对单颗
# 真坏核的屏蔽 → 放出 efuse 实测为好的核 + GPU。真 RK3588S2 上 cpu-code≠0x3582 → 补丁空操作。
# 实现：lib/uboot.sh 按本旗 git apply 该补丁。不稳可设 0 回原厂。
# 参考 ../alpine/docs/rk3582-unlock.md（rock5c 真机实测开核后 7 核 + GPU）。
BOARD_UNLOCK_CORES="1"
