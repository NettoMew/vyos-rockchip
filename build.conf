# build.conf — 用户可调旋钮。所有项都可被环境变量覆盖：
#   VYOS_VERSION=1.5-test scripts/build.sh e20c

# --- VyOS 源 ------------------------------------------------------------------
# vyos-build 克隆来源。留空 = 自动探测：优先同级本地检出（秒级克隆），
# 否则回退到上游 GitHub。
VYOS_BUILD_REPO="${VYOS_BUILD_REPO:-}"
VYOS_BUILD_REF="${VYOS_BUILD_REF:-}"          # 留空 = 仓库默认分支

# 烙进镜像的构建者标识（build-vyos-image --build-by）。
BUILD_BY="${BUILD_BY:-le4k@msn.com}"

# 镜像版本串。留空 = ISO 构建时生成 YYYY.MM.DD-HHMM-rockchip。
VYOS_VERSION="${VYOS_VERSION:-}"

# 内核构建模式：container = 官方流程进 arm64 容器（默认，与官方环境零差异，慢）；
# cross = 宿主机交叉编译（快一个量级，产物同名同版本，不带 perf/headers 差异见
# lib/kernel.sh 头注）。改 DTS/补丁迭代用 cross：KERNEL_BUILD_MODE=cross REBUILD_KERNEL=1 make <板>
KERNEL_BUILD_MODE="${KERNEL_BUILD_MODE:-container}"

# --- 构建容器（arm64，经 qemu binfmt 仿真）------------------------------------
BUILDER_IMAGE="${BUILDER_IMAGE:-vyos-rockchip/builder:rolling}"
BUILDER_PULL_IMAGE="${BUILDER_PULL_IMAGE:-vyos/vyos-build:current}"
BUILDER_PULL="${BUILDER_PULL:-1}"             # 0 = 不尝试 pull，直接本地构建

# --- U-Boot / Rockchip 固件 blob ----------------------------------------------
UBOOT_REPO="${UBOOT_REPO:-https://source.denx.de/u-boot/u-boot.git}"
UBOOT_REF="${UBOOT_REF:-master}"              # 求复现性可钉到 v2026.xx 发布 tag
RKBIN_REPO="${RKBIN_REPO:-https://github.com/rockchip-linux/rkbin.git}"
RKBIN_REF="${RKBIN_REF:-master}"

# --- 镜像几何 ------------------------------------------------------------------
IMAGE_SIZE_GIB="${IMAGE_SIZE_GIB:-4}"         # 稀疏文件 + zstd，大一点几乎不占空间
ESP_START_MIB="${ESP_START_MIB:-16}"          # ≥16：u-boot-rockchip.bin 占到 ~10MiB
ESP_SIZE_MIB="${ESP_SIZE_MIB:-256}"
ZSTD_LEVEL="${ZSTD_LEVEL:-19}"
KEEP_RAW_IMAGE="${KEEP_RAW_IMAGE:-0}"         # 1 = 压缩后保留未压缩 .img

JOBS="${JOBS:-$(nproc)}"
